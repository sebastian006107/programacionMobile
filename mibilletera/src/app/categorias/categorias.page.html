<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/perfil"></ion-back-button>
    </ion-buttons>
    <ion-title>Categorías</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <!-- Crear o editar una categoría -->
  <ion-card>
    <ion-card-header>
      <ion-card-subtitle>
        {{ editando ? 'Editar categoría' : 'Nueva categoría' }}
      </ion-card-subtitle>
    </ion-card-header>
    <ion-card-content>
      <ion-list lines="full" class="formulario">
        <ion-item>
          <ion-icon slot="start" [name]="icono" class="icono-campo"></ion-icon>
          <ion-input
            label="Nombre"
            labelPlacement="stacked"
            [(ngModel)]="nombre"
            placeholder="Ej: Salud">
          </ion-input>
        </ion-item>

        <ion-item lines="none">
          <ion-icon slot="start" name="apps-outline" class="icono-campo"></ion-icon>
          <ion-select
            label="Icono"
            labelPlacement="stacked"
            interface="popover"
            [(ngModel)]="icono">
            <ion-select-option *ngFor="let i of iconos" [value]="i.nombre">
              {{ i.etiqueta }}
            </ion-select-option>
          </ion-select>
        </ion-item>
      </ion-list>

      <ion-button expand="block" class="ion-margin-top" (click)="guardar()">
        {{ editando ? 'Guardar cambios' : 'Crear categoría' }}
      </ion-button>

      <ion-button *ngIf="editando" expand="block" fill="clear" (click)="cancelarEdicion()">
        Cancelar
      </ion-button>
    </ion-card-content>
  </ion-card>

  <!-- Listado -->
  <ion-list class="lista-categorias" [inset]="true" *ngIf="categorias.length > 0">
    <ion-list-header>
      <ion-label>Tus categorías</ion-label>
    </ion-list-header>

    <ion-item-sliding *ngFor="let c of categorias">
      <ion-item button detail="false" (click)="editar(c)">
        <ion-icon slot="start" [name]="c.icono || 'pricetag'" class="icono-categoria"></ion-icon>
        <ion-label>{{ c.nombre }}</ion-label>
        <ion-icon slot="end" name="create-outline" class="icono-editar"></ion-icon>
      </ion-item>

      <ion-item-options side="end">
        <ion-item-option color="danger" (click)="eliminar(c)">
          <ion-icon slot="start" name="trash-outline"></ion-icon>
          Eliminar
        </ion-item-option>
      </ion-item-options>
    </ion-item-sliding>
  </ion-list>

  <div class="estado-vacio" *ngIf="categorias.length === 0">
    <ion-icon name="pricetags-outline"></ion-icon>
    <h2>Sin categorías</h2>
    <p>Crea la primera para poder registrar gastos.</p>
  </div>
</ion-content>
